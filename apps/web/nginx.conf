server {
  listen 5173;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  location = /site.webmanifest {
    default_type application/manifest+json;
    try_files $uri =404;
  }

  location / {
    try_files $uri /index.html;
  }
}
