server {
  listen 5173;

  add_header Cache-Control "no-store" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; connect-src 'self' http://127.0.0.1:* http://localhost:*; font-src 'self'; form-action 'none'; frame-ancestors 'none'; img-src 'self' data:; object-src 'none'; script-src 'self'; style-src 'self'" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  location = /site.webmanifest {
    default_type application/manifest+json;
    try_files $uri =404;
  }

  location / {
    try_files $uri /index.html;
  }
}
