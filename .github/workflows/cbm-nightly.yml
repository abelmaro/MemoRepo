name: CBM nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --target cbm-test -t memorepo-cbm-test -f apps/api/Dockerfile .
      - run: mkdir -p artifacts
      - run: docker run --rm -e MEMOREPO_RUN_CBM_CONTRACT=1 memorepo-cbm-test pnpm --filter @memorepo/api test:cbm-contract
      - run: docker run --rm -v "${{ github.workspace }}/artifacts:/artifacts" memorepo-cbm-test pnpm --filter @memorepo/api perf:cbm -- --output /artifacts/cbm-fast.json --mode fast --warm-repetitions 5
      - uses: actions/upload-artifact@v4
        with:
          name: cbm-nightly-${{ github.run_id }}
          path: artifacts/
          retention-days: 30
